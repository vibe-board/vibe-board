name: Build Tauri macOS App

on:
  workflow_dispatch:
  push:
    branches:
      - vb/a66e-tauri
    paths:
      - 'tauri-client/**'
      - '.github/workflows/build-tauri-macos.yml'

concurrency:
  group: tauri-macos-${{ github.ref_name }}
  cancel-in-progress: true

permissions:
  contents: write

env:
  NODE_VERSION: 22
  PNPM_VERSION: 10.13.1

jobs:
  build-tauri-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Cache Cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry/cache
            ~/.cargo/registry/index
            ~/.cargo/git/db
            ~/.cargo/bin
          key: cargo-tauri-macos-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            cargo-tauri-macos-${{ runner.os }}-

      - name: Cache pnpm store
        uses: actions/cache@v5
        with:
          path: |
            ~/.pnpm-store
            tauri-client/node_modules
          key: pnpm-tauri-macos-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            pnpm-tauri-macos-

      - name: Install dependencies
        run: |
          cd tauri-client
          pnpm install --frozen-lockfile

      - name: Build frontend
        run: |
          cd tauri-client
          pnpm build

      - name: Build Rust binary
        run: |
          cd tauri-client/src-tauri
          cargo build --release --target aarch64-apple-darwin
        env:
          MACOSX_DEPLOYMENT_TARGET: 11.0

      - name: Create .app bundle
        run: |
          BINARY="tauri-client/src-tauri/target/aarch64-apple-darwin/release/vibe-board-mobile"
          APP_DIR="output/Vibe Board.app"
          mkdir -p "${APP_DIR}/Contents/MacOS"
          mkdir -p "${APP_DIR}/Contents/Resources"
          cp "${BINARY}" "${APP_DIR}/Contents/MacOS/Vibe Board"
          chmod +x "${APP_DIR}/Contents/MacOS/Vibe Board"
          cat > "${APP_DIR}/Contents/Info.plist" << 'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CFBundleExecutable</key>
            <string>Vibe Board</string>
            <key>CFBundleIdentifier</key>
            <string>com.vibe-board.app</string>
            <key>CFBundleName</key>
            <string>Vibe Board</string>
            <key>CFBundleVersion</key>
            <string>0.1.0</string>
            <key>CFBundleShortVersionString</key>
            <string>0.1.0</string>
            <key>CFBundlePackageType</key>
            <string>APPL</string>
            <key>LSMinimumSystemVersion</key>
            <string>11.0</string>
          </dict>
          </plist>
          PLIST
          echo "Created .app bundle:"
          ls -la "${APP_DIR}/Contents/MacOS/"

      - name: List build artifacts
        run: |
          echo "=== Binary ==="
          ls -la tauri-client/src-tauri/target/aarch64-apple-darwin/release/vibe-board-mobile 2>/dev/null || echo "No binary"
          echo "=== APP bundle ==="
          find output -name "*.app" -type d 2>/dev/null || true

      - name: Upload binary artifact
        uses: actions/upload-artifact@v6
        with:
          name: vibe-board-macos-arm64-binary
          path: tauri-client/src-tauri/target/aarch64-apple-darwin/release/vibe-board-mobile
          retention-days: 7

      - name: Upload APP artifact
        uses: actions/upload-artifact@v6
        with:
          name: vibe-board-macos-arm64-app
          path: output/*.app
          retention-days: 7
