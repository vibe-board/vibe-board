name: Build Tauri macOS App

on:
  workflow_dispatch:
  push:
    branches:
      - vb/a66e-tauri
    paths:
      - 'tauri-client/**'
      - '.github/workflows/build-tauri-macos.yml'

concurrency:
  group: tauri-macos-${{ github.ref_name }}
  cancel-in-progress: true

permissions:
  contents: write

env:
  NODE_VERSION: 22
  PNPM_VERSION: 10.13.1

jobs:
  build-tauri-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Cache Cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry/cache
            ~/.cargo/registry/index
            ~/.cargo/git/db
            ~/.cargo/bin
          key: cargo-tauri-macos-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            cargo-tauri-macos-${{ runner.os }}-

      - name: Cache pnpm store
        uses: actions/cache@v5
        with:
          path: |
            ~/.pnpm-store
            tauri-client/node_modules
          key: pnpm-tauri-macos-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            pnpm-tauri-macos-

      - name: Install dependencies
        run: |
          cd tauri-client
          pnpm install --frozen-lockfile

      - name: Build frontend
        run: |
          cd tauri-client
          pnpm build

      - name: Debug dist directory
        run: |
          echo "=== Repo root dist ==="
          ls -la dist/ 2>/dev/null || echo "No dist at repo root"
          echo "=== tauri-client/dist ==="
          ls -la tauri-client/dist/ 2>/dev/null || echo "No dist at tauri-client/dist"
          echo "=== frontendDist resolution from src-tauri ==="
          echo "tauri.conf.json frontendDist: ../../dist"
          echo "Resolved: $(cd tauri-client/src-tauri && realpath ../../dist 2>/dev/null || echo 'not found')"

      - name: Build Tauri macOS app (arm64)
        run: |
          cd tauri-client
          pnpm tauri build --target aarch64-apple-darwin
        env:
          MACOSX_DEPLOYMENT_TARGET: 11.0

      - name: List build artifacts
        run: |
          echo "=== DMG files ==="
          find tauri-client/src-tauri/target -name "*.dmg" -type f 2>/dev/null || true
          echo "=== APP bundles ==="
          find tauri-client/src-tauri/target -name "*.app" -type d 2>/dev/null || true
          echo "=== Bundle directory ==="
          find tauri-client/src-tauri/target/aarch64-apple-darwin/release/bundle -type f 2>/dev/null || true

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v6
        with:
          name: vibe-board-macos-arm64-dmg
          path: tauri-client/src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg
          retention-days: 7
          if-no-files-found: warn

      - name: Upload APP artifact
        uses: actions/upload-artifact@v6
        with:
          name: vibe-board-macos-arm64-app
          path: tauri-client/src-tauri/target/aarch64-apple-darwin/release/bundle/macos/*.app
          retention-days: 7
          if-no-files-found: warn
