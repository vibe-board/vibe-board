name: Tauri App Build

on:
  push:
    paths:
      - 'tauri-app/**'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-desktop:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
          - platform: ubuntu-22.04
            target: aarch64-unknown-linux-gnu
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
          - platform: macos-latest
            target: aarch64-apple-darwin
          - platform: macos-latest
            target: x86_64-apple-darwin

    runs-on: ${{ matrix.platform }}
    defaults:
      run:
        working-directory: vibe-kanban

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: ./.github/actions/setup-node

      - name: Setup Rust
        uses: ./.github/actions/cargo-checks-common-setup
        with:
          toolchain: nightly-2025-12-04
          cache-key: tauri-build-${{ matrix.target }}

      - name: Install cross-compilation tools (Linux aarch64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: vibe-kanban/tauri-app
          args: --target ${{ matrix.target }}

      - name: Upload artifacts (Linux)
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: vibe-board-${{ matrix.target }}
          path: |
            vibe-kanban/tauri-app/src-tauri/target/${{ matrix.target }}/release/bundle/**/*.deb
            vibe-kanban/tauri-app/src-tauri/target/${{ matrix.target }}/release/bundle/**/*.AppImage
          if-no-files-found: warn

      - name: Upload artifacts (macOS)
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: vibe-board-${{ matrix.target }}
          path: |
            vibe-kanban/tauri-app/src-tauri/target/${{ matrix.target }}/release/bundle/**/*.dmg
            vibe-kanban/tauri-app/src-tauri/target/${{ matrix.target }}/release/bundle/**/*.app.tar.gz
          if-no-files-found: warn

      - name: Upload artifacts (Windows)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: vibe-board-${{ matrix.target }}
          path: |
            vibe-kanban/tauri-app/src-tauri/target/${{ matrix.target }}/release/bundle/**/*.msi
            vibe-kanban/tauri-app/src-tauri/target/${{ matrix.target }}/release/bundle/**/*.exe
          if-no-files-found: warn
