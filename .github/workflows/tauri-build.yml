name: Tauri App Build

on:
  push:
    paths:
      - 'tauri-app/**'
      - '.github/workflows/tauri-build.yml'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-desktop:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu

          - platform: windows-latest
            target: x86_64-pc-windows-msvc
          - platform: macos-latest
            target: aarch64-apple-darwin
          - platform: macos-latest
            target: x86_64-apple-darwin

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: ./.github/actions/setup-node

      - name: Setup Rust
        uses: ./.github/actions/cargo-checks-common-setup
        with:
          toolchain: nightly-2025-12-04
          cache-key: tauri-build-${{ matrix.target }}

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Add Rust target
        run: rustup target add ${{ matrix.target }}


      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: tauri-app
          args: --target ${{ matrix.target }}

      - name: Upload artifacts (Linux)
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: vibe-board-${{ matrix.target }}
          path: |
            tauri-app/src-tauri/target/${{ matrix.target }}/release/bundle/**/*.deb
            tauri-app/src-tauri/target/${{ matrix.target }}/release/bundle/**/*.AppImage
          if-no-files-found: warn

      - name: Upload artifacts (macOS)
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: vibe-board-${{ matrix.target }}
          path: |
            tauri-app/src-tauri/target/${{ matrix.target }}/release/bundle/**/*.dmg
            tauri-app/src-tauri/target/${{ matrix.target }}/release/bundle/**/*.app.tar.gz
          if-no-files-found: warn

      - name: Upload artifacts (Windows)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: vibe-board-${{ matrix.target }}
          path: |
            tauri-app/src-tauri/target/${{ matrix.target }}/release/bundle/**/*.msi
            tauri-app/src-tauri/target/${{ matrix.target }}/release/bundle/**/*.exe
          if-no-files-found: warn
