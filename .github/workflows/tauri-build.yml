name: Build Tauri App

on:
  push:
    branches:
      - '**'
    paths:
      - 'crates/tauri-app/**'
      - 'tauri-app-frontend/**'
      - '.github/workflows/tauri-build.yml'
  workflow_dispatch:

concurrency:
  group: tauri-build-${{ github.ref_name }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  NODE_VERSION: 22
  PNPM_VERSION: 10.13.1

jobs:
  build-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node
        uses: ./.github/actions/setup-node

      - name: Install frontend dependencies
        run: cd tauri-app-frontend && pnpm install

      - name: Type check frontend
        run: cd tauri-app-frontend && pnpm run check

      - name: Build frontend
        run: cd tauri-app-frontend && pnpm run build

      - name: Upload frontend dist
        uses: actions/upload-artifact@v6
        with:
          name: tauri-frontend-dist
          path: tauri-app-frontend/dist/
          retention-days: 1

  build-tauri:
    needs: build-frontend
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            name: linux-x64
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            name: linux-arm64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            name: windows-x64
          - os: windows-11-arm
            target: aarch64-pc-windows-msvc
            name: windows-arm64
          - os: macos-15
            target: x86_64-apple-darwin
            name: macos-x64
          - os: macos-15
            target: aarch64-apple-darwin
            name: macos-arm64

    env:
      CARGO_INCREMENTAL: "0"
      SCCACHE_GHA_ENABLED: "true"
      RUSTC_WRAPPER: "sccache"
      SCCACHE_CACHE_SIZE: "10G"

    steps:
      - uses: actions/checkout@v6

      - name: Setup sccache
        uses: BloopAI/sccache-action@main

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          DEBIAN_FRONTEND=noninteractive sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev

      - name: Cache Cargo registry
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry/cache
            ~/.cargo/registry/index
            ~/.cargo/git/db
          key: cargo-tauri-${{ runner.os }}-${{ matrix.target }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            cargo-tauri-${{ runner.os }}-${{ matrix.target }}-

      - name: Cache Cargo target
        uses: actions/cache@v5
        with:
          path: crates/tauri-app/target
          key: target-tauri-${{ runner.os }}-${{ matrix.target }}-${{ github.ref_name }}-${{ github.sha }}
          restore-keys: |
            target-tauri-${{ runner.os }}-${{ matrix.target }}-${{ github.ref_name }}-
            target-tauri-${{ runner.os }}-${{ matrix.target }}-

      - name: Download frontend dist
        uses: actions/download-artifact@v6
        with:
          name: tauri-frontend-dist
          path: tauri-app-frontend/dist

      - name: Disable beforeBuildCommand for CI
        shell: bash
        run: |
          cd crates/tauri-app
          python3 -c "
          import json
          with open('tauri.conf.json') as f:
              cfg = json.load(f)
          cfg['build']['beforeBuildCommand'] = ''
          with open('tauri.conf.json', 'w') as f:
              json.dump(cfg, f, indent=2)
          "

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: crates/tauri-app
          args: --target ${{ matrix.target }}

      - name: List build artifacts
        shell: bash
        run: |
          echo "=== Build output ==="
          find crates/tauri-app/target/${{ matrix.target }}/release/bundle -type f 2>/dev/null || true
          find crates/tauri-app/target/release/bundle -type f 2>/dev/null || true

      - name: Upload Linux artifacts
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v6
        with:
          name: vibe-board-tauri-${{ matrix.name }}
          path: |
            crates/tauri-app/target/${{ matrix.target }}/release/bundle/**/*.deb
            crates/tauri-app/target/${{ matrix.target }}/release/bundle/**/*.AppImage
            crates/tauri-app/target/${{ matrix.target }}/release/bundle/**/*.rpm
          retention-days: 7
          if-no-files-found: warn

      - name: Upload Windows artifacts
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v6
        with:
          name: vibe-board-tauri-${{ matrix.name }}
          path: |
            crates/tauri-app/target/${{ matrix.target }}/release/bundle/**/*.msi
            crates/tauri-app/target/${{ matrix.target }}/release/bundle/**/*.exe
          retention-days: 7
          if-no-files-found: warn

      - name: Upload macOS artifacts
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v6
        with:
          name: vibe-board-tauri-${{ matrix.name }}
          path: |
            crates/tauri-app/target/${{ matrix.target }}/release/bundle/**/*.dmg
            crates/tauri-app/target/${{ matrix.target }}/release/bundle/**/*.app
          retention-days: 7
          if-no-files-found: warn
