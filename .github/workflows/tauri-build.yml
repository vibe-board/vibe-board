name: Tauri Build

on:
  push:
    branches:
      - vb/05fb-app
    paths:
      - 'frontend/**'
      - '.github/workflows/tauri-build.yml'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: 22
  PNPM_VERSION: 10.13.1

jobs:
  build-tauri:
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          # macOS ARM (M1+)
          - platform: macos-latest
            args: '--target aarch64-apple-darwin'
            rust-targets: 'aarch64-apple-darwin'
            artifact-name: vibe-board-macos-arm64
          # macOS Intel
          - platform: macos-latest
            args: '--target x86_64-apple-darwin'
            rust-targets: 'x86_64-apple-darwin'
            artifact-name: vibe-board-macos-x64
          # Linux x64
          - platform: ubuntu-22.04
            args: ''
            rust-targets: ''
            artifact-name: vibe-board-linux-x64
          # Windows x64
          - platform: windows-latest
            args: ''
            rust-targets: ''
            artifact-name: vibe-board-windows-x64

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      # --- Linux dependencies ---
      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      # --- Node.js + pnpm ---
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Get pnpm store directory
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Cache pnpm
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-${{ runner.arch }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-${{ runner.arch }}-pnpm-store-

      - name: Install frontend dependencies
        run: pnpm install

      # --- Rust ---
      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-targets }}

      - name: Cache Rust dependencies
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './frontend/src-tauri -> target'
          shared-key: tauri-build-${{ matrix.artifact-name }}

      # --- Build ---
      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: frontend
          tauriScript: pnpm tauri
          args: ${{ matrix.args }}

      # --- Upload artifacts ---
      # Each platform produces different file types in different locations.
      # tauri-action outputs the built artifacts into frontend/src-tauri/target/release/bundle/

      - name: Upload macOS artifacts
        if: startsWith(matrix.platform, 'macos')
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}
          path: |
            frontend/src-tauri/target/*/release/bundle/dmg/*.dmg
            frontend/src-tauri/target/*/release/bundle/macos/*.app
            frontend/src-tauri/target/*/release/bundle/macos/*.app.tar.gz
          if-no-files-found: warn
          retention-days: 14

      - name: Upload Linux artifacts
        if: matrix.platform == 'ubuntu-22.04'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}
          path: |
            frontend/src-tauri/target/release/bundle/deb/*.deb
            frontend/src-tauri/target/release/bundle/rpm/*.rpm
            frontend/src-tauri/target/release/bundle/appimage/*.AppImage
          if-no-files-found: warn
          retention-days: 14

      - name: Upload Windows artifacts
        if: matrix.platform == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}
          path: |
            frontend/src-tauri/target/release/bundle/msi/*.msi
            frontend/src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: warn
          retention-days: 14

  # --- Summary job: collect all download links ---
  summary:
    needs: build-tauri
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Print download links
        env:
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          echo "## Tauri Build Artifacts" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Download the built apps from the Artifacts section:" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Platform | Artifact |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|----------|" >> $GITHUB_STEP_SUMMARY
          echo "| macOS ARM64 (M1+) | \`vibe-board-macos-arm64\` |" >> $GITHUB_STEP_SUMMARY
          echo "| macOS x64 (Intel) | \`vibe-board-macos-x64\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Linux x64 (.deb/.rpm/.AppImage) | \`vibe-board-linux-x64\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Windows x64 (.msi/.exe) | \`vibe-board-windows-x64\` |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "🔗 [Download all artifacts]($RUN_URL#artifacts)" >> $GITHUB_STEP_SUMMARY
